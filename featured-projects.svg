<svg width="860" height="240" viewBox="0 0 860 240" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .card-bg { fill: #161b22; }
      .card-border { stroke: #30363d; stroke-width: 1; fill: none; }
      .title { fill: #e6edf3; font-size: 15px; font-weight: 600; }
      .desc { fill: #8b949e; font-size: 12.5px; }
      .badge-c-bg { fill: #1a3a5c; }
      .badge-c-text { fill: #58a6ff; font-size: 11px; font-weight: 600; }
      .badge-ps-bg { fill: #1a3a2a; }
      .badge-ps-text { fill: #3fb950; font-size: 11px; font-weight: 600; }
      .dot { fill: #30363d; }
      .section-label { fill: #484f58; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="240" fill="#0d1117" rx="12"/>

  <!-- Section label -->
  <text x="430" y="28" text-anchor="middle" class="section-label">FEATURED PROJECTS</text>
  <!-- Divider lines either side of label -->
  <line x1="30" y1="24" x2="300" y2="24" stroke="#21262d" stroke-width="1"/>
  <line x1="560" y1="24" x2="830" y2="24" stroke="#21262d" stroke-width="1"/>

  <!-- LEFT CARD -->
  <rect x="20" y="44" width="400" height="180" rx="8" class="card-bg"/>
  <rect x="20" y="44" width="400" height="180" rx="8" class="card-border"/>

  <!-- Left card top accent line -->
  <rect x="20" y="44" width="400" height="3" rx="2" fill="#1f6feb"/>

  <!-- Title -->
  <text x="40" y="80" class="title">Employee Management System</text>

  <!-- Badge C -->
  <rect x="40" y="92" width="42" height="20" rx="4" class="badge-c-bg"/>
  <text x="61" y="106" text-anchor="middle" class="badge-c-text">C</text>

  <!-- Description — wrapped manually -->
  <text x="40" y="134" class="desc">A file-based C project for managing employee records,</text>
  <text x="40" y="152" class="desc">payroll, and attendance via CLI — designed to master</text>
  <text x="40" y="170" class="desc">structs and file handling.</text>

  <!-- Divider -->
  <line x1="40" y1="188" x2="400" y2="188" stroke="#21262d" stroke-width="1"/>

  <!-- Repo link row -->
  <!-- GitHub icon (simplified) -->
  <circle cx="56" cy="207" r="9" fill="none" stroke="#484f58" stroke-width="1.2"/>
  <text x="56" y="211" text-anchor="middle" fill="#484f58" font-size="10" font-weight="700">gh</text>
  <text x="72" y="211" fill="#58a6ff" font-size="12">shams-27/EmployeeManagementSystem</text>

  <!-- RIGHT CARD -->
  <rect x="440" y="44" width="400" height="180" rx="8" class="card-bg"/>
  <rect x="440" y="44" width="400" height="180" rx="8" class="card-border"/>

  <!-- Right card top accent line -->
  <rect x="440" y="44" width="400" height="3" rx="2" fill="#238636"/>

  <!-- Title -->
  <text x="460" y="80" class="title">Auto GCC Solution</text>

  <!-- Badge PowerShell -->
  <rect x="460" y="92" width="76" height="20" rx="4" class="badge-ps-bg"/>
  <text x="498" y="106" text-anchor="middle" class="badge-ps-text">PowerShell</text>

  <!-- Description -->
  <text x="460" y="134" class="desc">Instantly installs GCC / G++ (MinGW-w64) on Windows</text>
  <text x="460" y="152" class="desc">with a single PowerShell command. No manual</text>
  <text x="460" y="170" class="desc">downloading, no PATH headaches.</text>

  <!-- Divider -->
  <line x1="460" y1="188" x2="820" y2="188" stroke="#21262d" stroke-width="1"/>

  <!-- Repo link row -->
  <circle cx="476" cy="207" r="9" fill="none" stroke="#484f58" stroke-width="1.2"/>
  <text x="476" y="211" text-anchor="middle" fill="#484f58" font-size="10" font-weight="700">gh</text>
  <text x="492" y="211" fill="#3fb950" font-size="12">Shams-27/Auto-GCC</text>
</svg>
