name: Generate Profile Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics image
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          
          user: shams-27
          template: classic
          base: header, activity, community, repositories
          config_timezone: UTC
          
          config_padding: 6%
          palette: nord
          
          config_order: base.header, base.repositories, languages, habits
          
          plugin_languages: yes
          plugin_languages_sections: most-used, percentages
          plugin_languages_details: percentage, lines
          plugin_languages_indepth: yes
          plugin_languages_limit: 6
          
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          
          plugin_repositories: yes
          plugin_repositories_affiliations: owner
