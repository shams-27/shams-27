name: Generate Profile Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics image
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          
          user: shams-27
          template: classic
          
          # Minimal base: keeps core stats but drops heavy graphical activity cards
          base: header
          config_timezone: UTC
          
          # Sets a beautiful, low-contrast muted color scheme
          config_presets: nord
          
          # Clean, spacious alignment with no icons or extra lines
          config_padding: 4%
          config_order: base.header, languages
          
          # Minimalist languages chart (simple text percentages instead of massive bars)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 4
          


          
