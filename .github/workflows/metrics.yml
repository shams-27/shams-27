name: Generate Profile Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics image
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          
          user: shams-27
          template: classic
          base: header, repositories, community, activity
          config_timezone: UTC
          
          config_presets: nord
          config_padding: 24px
          
          config_order: base.header, base.repositories, languages
          
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 5
          
          plugin_repositories: yes
          plugin_repositories_affiliations: owner
          
          extras_css: |
            .container {
              border: 1px solid #4c566a !important;
              border-radius: 12px !important;
              background-color: #2e3440 !important;
            }
            section {
              border: 1px solid #3b4252 !important;
              border-radius: 8px !important;
              padding: 16px !important;
              margin-bottom: 16px !important;
              background-color: #3b425240 !important;
            }
            h2, h3 {
              color: #88c0d0 !important;
              border-bottom: 1px solid #4c566a !important;
              padding-bottom: 8px !important;
            }
