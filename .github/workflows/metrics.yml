name: Generate Profile Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate metrics image
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: shams-27
          template: classic
          base: header
          config_timezone: UTC
          config_padding: 4%
          # Languages section
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, lines
          plugin_languages_limit: 8
          plugin_languages_categories: programming, markup, stylesheet, data
          plugin_languages_colors: "C:#7A9BB5, C++:#A67AB5, Bash:#7AB58A, PowerShell:#B5A87A, HTML:#B5775A, CSS:#5AB5A8, JavaScript:#B5B55A, Java:#B5645A, Python:#5A7AB5, Markdown:#999999"
          plugin_languages_threshold: 0%
      - name: Generate contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: shams-27
          github_token: ${{ secrets.METRICS_TOKEN }}
          outputs: |
            github-contribution-grid.svg?palette=github-dark
            github-contribution-grid-snake.gif?palette=github-dark
      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          options: user=shams-27&theme=onedark-duo&hide_border=true&disable_animations=false
          path: github-streak.svg
      - name: Mute text colors in metrics SVG
        run: |
          sudo apt-get install -y xmlstarlet
          
          # Replace all text fill colors
          xmlstarlet ed -L \
            -u '//*[@fill="#54aeff"]/@fill' -v '#7A9AA8' \
            -u '//*[@fill="#0969da"]/@fill' -v '#7A9AA8' \
            -u '//*[@fill="#0366d6"]/@fill' -v '#7A9AA8' \
            -u '//*[@fill="#d1d5da"]/@fill' -v '#8A9AA8' \
            -u '//*[@fill="#959da5"]/@fill' -v '#7A8A9A' \
            github-metrics.svg
          
          # Handle colors inside style attributes
          sed -i 's/color:#54aeff/color:#7A9AA8/gi' github-metrics.svg
          sed -i 's/color:#0969da/color:#7A9AA8/gi' github-metrics.svg
          sed -i 's/color:#0366d6/color:#7A9AA8/gi' github-metrics.svg
          sed -i 's/color:#d1d5da/color:#8A9AA8/gi' github-metrics.svg
          sed -i 's/color:#959da5/color:#7A8A9A/gi' github-metrics.svg
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-metrics.svg github-streak.svg github-contribution-grid.svg github-contribution-grid-snake.gif
          git commit -m "Update metrics, streak stats and contribution graph" || true
          git pull --rebase origin main
          git push
      - name: Dump SVG content
        run: cat github-metrics.svg
        









          
