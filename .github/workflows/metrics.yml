name: Generate Profile Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Remove stale metrics file
        run: rm -f github-metrics.svg

      - name: Generate metrics image
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: shams-27
          template: classic
          base: header
          config_timezone: UTC
          config_padding: 4%
          # Languages section
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, lines
          plugin_languages_limit: 8
          plugin_languages_categories: programming, markup, stylesheet, data
          plugin_languages_colors: "C:#7A9BB5, C++:#A67AB5, Bash:#7AB58A, PowerShell:#B5A87A, HTML:#B5775A, CSS:#5AB5A8, JavaScript:#B5B55A, Java:#B5645A, Python:#5A7AB5, Markdown:#999999"
          plugin_languages_threshold: 0%

      - name: Verify metrics SVG was generated fresh
        run: |
          if [ ! -s github-metrics.svg ]; then
            echo "::error::github-metrics.svg was not generated. Check METRICS_TOKEN scopes/validity."
            exit 1
          fi
          echo "File size: $(wc -c < github-metrics.svg) bytes"

      - name: Generate contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: shams-27
          github_token: ${{ secrets.METRICS_TOKEN }}
          outputs: |
            github-contribution-grid.svg?palette=github-dark&color_snake=#7A9AA8
            github-contribution-grid-snake.gif?palette=github-dark&color_snake=#7A9AA8

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          options: user=shams-27&theme=onedark-duo&hide_border=true&disable_animations=false
          path: github-streak.svg

      - name: Mute text colors in metrics SVG
        run: |
          python3 << 'EOF'
          import re

          with open("github-metrics.svg", "r") as f:
              content = f.read()

          # Markers make this idempotent: any previously injected block
          # (from this run or any stale prior run) is stripped before
          # adding exactly one fresh copy. This prevents the override
          # from ever stacking duplicates again.
          start_marker = "/* CUSTOM_OVERRIDE_START */"
          end_marker = "/* CUSTOM_OVERRIDE_END */"

          content = re.sub(
              re.escape(start_marker) + r".*?" + re.escape(end_marker),
              "",
              content,
              flags=re.DOTALL,
          )

          custom_css = f"""{start_marker}
          h2, h3, .field, text, span, div, small {{
            color: #8A9AA8 !important;
            fill: #8A9AA8 !important;
          }}
          h2.field, h3.field {{
            color: #7A9AA8 !important;
          }}
          {end_marker}
          """

          content = content.replace("</style>", custom_css + "</style>", 1)

          with open("github-metrics.svg", "w") as f:
              f.write(content)
          EOF

      - name: Validate SVG is well-formed XML
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          ET.parse('github-metrics.svg')
          print('github-metrics.svg is valid XML')
          "

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-metrics.svg github-streak.svg github-contribution-grid.svg github-contribution-grid-snake.gif
          git commit -m "Update metrics, streak stats and contribution graph" || exit 0
          git push origin main
