name: Generate Profile Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate metrics image
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: shams-27
          template: classic
          base: header
          config_timezone: UTC
          config_padding: 4%
          # Languages section
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, lines
          plugin_languages_limit: 8
          plugin_languages_categories: programming, markup, stylesheet, data
          plugin_languages_colors: "C:#7A9BB5, C++:#9B7A9E, Bash:#7A9E7A, PowerShell:#7A9EB5, HTML:#B5907A, CSS:#7A9E9B, JavaScript:#B5A87A, Java:#B5847A, Python:#7A8FB5, Markdown:#9E9E9E"
          plugin_languages_threshold: 0%
      - name: Generate contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: shams-27
          github_token: ${{ secrets.METRICS_TOKEN }}
          outputs: |
            github-contribution-grid.svg?palette=github-dark
            github-contribution-grid-snake.gif?palette=github-dark
      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          options: user=shams-27&theme=onedark-duo&hide_border=true&disable_animations=false
          path: github-streak.svg
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-streak.svg github-contribution-grid.svg github-contribution-grid-snake.gif
          git commit -m "Update streak stats and contribution graph" || exit 0
          git pull --rebase origin main
          git push
