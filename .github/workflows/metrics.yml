name: Generate Profile Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate metrics image
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: shams-27
          template: classic
          base: header, activity
          config_timezone: UTC
          config_padding: 4%

          # Languages section
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 4

      - name: Generate contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: shams-27
          github_token: ${{ secrets.METRICS_TOKEN }}
          outputs: |
            github-contribution-grid.svg?palette=github-dark
            github-contribution-grid-snake.gif?palette=github-dark

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          options: user=shams-27&theme=onedark-duo&hide_border=true&disable_animations=false
          path: github-streak.svg

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-streak.svg github-contribution-grid.svg github-contribution-grid-snake.gif
          git commit -m "Update streak stats and contribution graph" || exit 0
          git pull --rebase origin main
          git push
