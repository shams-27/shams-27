name: Generate Profile Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics image
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg

          user: shams-27
          template: classic

          base: header, activity
          config_timezone: UTC

          # Muted, low-contrast dark theme — alternative to nord
          # If you don't like it, swap for @dimmed or @onedark (same single line)
          config_presets: "@gotham"

          config_padding: 4%
          config_order: base.header, base.activity, languages, repositories

          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 4

          # Repo card: now actually rendered (limit raised from 0)
          plugin_repositories: yes
          plugin_repositories_affiliations: owner
          plugin_repositories_limit: 4
