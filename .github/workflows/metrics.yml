name: Generate Profile Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics image
        uses: lowlighter/metrics@latest
        with:

          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          
          user: shams-27
          template: classic
          base: header, repositories, community, activity
          config_timezone: UTC
          
          config_order: base.header, base.repositories, languages
          
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 5
          
          plugin_repositories: yes
          plugin_repositories_affiliations: owner
          plugin_repositories_featured: shams-27/Auto-GCC








          
